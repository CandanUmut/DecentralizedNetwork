<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TimeCoin node</title>
<style>
  :root { color-scheme: light dark;
    --fg: #1a1d21; --bg: #fafafa; --card: #ffffff; --line: #e2e5e9; --dim: #6b7280;
    --ok: #16794c; --dead: #a33; }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e6e8ea; --bg: #131518; --card: #1c1f24; --line: #2c3138; --dim: #9aa3ad; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 1.25rem; font: 14px/1.5 system-ui, sans-serif;
         color: var(--fg); background: var(--bg); }
  h1 { font-size: 1.1rem; margin: 0 0 1rem; }
  h1 small { color: var(--dim); font-weight: normal; }
  .tiles { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
  .tile { background: var(--card); border: 1px solid var(--line); border-radius: 8px;
          padding: .6rem 1rem; min-width: 8rem; }
  .tile b { display: block; font-size: 1.4rem; font-variant-numeric: tabular-nums; }
  .tile span { color: var(--dim); font-size: .8rem; }
  section { background: var(--card); border: 1px solid var(--line); border-radius: 8px;
            padding: .75rem 1rem; margin-bottom: 1rem; overflow-x: auto; }
  section h2 { font-size: .85rem; margin: 0 0 .5rem; color: var(--dim);
               text-transform: uppercase; letter-spacing: .04em; }
  table { border-collapse: collapse; width: 100%; white-space: nowrap; }
  td, th { text-align: left; padding: .25rem .75rem .25rem 0; border-top: 1px solid var(--line);
           font-variant-numeric: tabular-nums; }
  th { border-top: none; color: var(--dim); font-weight: 500; font-size: .8rem; }
  code { font-size: .85em; color: var(--dim); }
  .ok { color: var(--ok); } .dead { color: var(--dead); }
  #me { color: var(--dim); font-size: .8rem; word-break: break-all; margin-bottom: 1rem; }
</style>
</head>
<body>
<h1>TimeCoin node <small id="net"></small></h1>
<div id="me"></div>
<div class="tiles">
  <div class="tile"><b id="balance">–</b><span>my balance</span></div>
  <div class="tile"><b id="peer_count">–</b><span>connected peers</span></div>
  <div class="tile"><b id="tx_count">–</b><span>DAG transactions</span></div>
  <div class="tile"><b id="tip_count">–</b><span>DAG tips</span></div>
  <div class="tile"><b id="inbox_count">–</b><span>inbox</span></div>
</div>
<section><h2>Balances</h2><table id="balances"></table></section>
<section><h2>Latest transactions</h2><table id="txs"></table></section>
<section><h2>Connected peers</h2><table id="peers"></table></section>
<script>
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const short = s => s.length > 20 ? s.slice(0, 10) + '…' + s.slice(-6) : s;

async function refresh() {
  try {
    const [st, bal, txs] = await Promise.all(
      ['/status', '/balances', '/transactions'].map(u => fetch(u).then(r => r.json())));

    $('me').textContent = `peer ${st.peer_id} · wallet ${st.wallet}`;
    $('balance').textContent = st.balance;
    $('peer_count').textContent = st.peer_count;
    $('tx_count').textContent = st.dag_transactions;
    $('tip_count').textContent = st.dag_tips;
    $('inbox_count').textContent = st.inbox_count;

    $('balances').innerHTML = '<tr><th>wallet</th><th>balance</th></tr>' +
      Object.entries(bal).map(([w, b]) =>
        `<tr><td><code title="${esc(w)}">${esc(short(w))}${w === st.wallet ? ' (me)' : ''}</code></td><td>${b}</td></tr>`).join('');

    $('txs').innerHTML = '<tr><th>kind</th><th>from</th><th>to</th><th>amount</th><th>memo</th><th>state</th></tr>' +
      txs.slice(-15).reverse().map(t =>
        `<tr><td>${esc(t.kind)}</td><td><code title="${esc(t.sender)}">${esc(short(t.sender))}</code></td>` +
        `<td><code title="${esc(t.receiver)}">${esc(short(t.receiver))}</code></td><td>${t.amount}</td>` +
        `<td>${esc(t.memo || '')}</td>` +
        `<td class="${t.applied ? 'ok' : 'dead'}">${t.applied ? 'applied' : 'not applied'}</td></tr>`).join('');

    $('peers').innerHTML = st.connected_peers.length
      ? st.connected_peers.map(p => `<tr><td><code>${esc(p)}</code></td></tr>`).join('')
      : '<tr><td class="dead">no peers connected</td></tr>';
  } catch (e) {
    $('me').textContent = 'node unreachable: ' + e;
  }
}
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
